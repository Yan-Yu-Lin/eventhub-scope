<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventHub · 專案範疇管理</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter','Noto Sans TC',sans-serif;background:#fafaf8;color:#0a0a0a;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .card{max-width:480px;width:100%}
  .mono{font-family:'JetBrains Mono',monospace}
  .top{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:#999;margin-bottom:2.5rem}
  h1{font-weight:200;font-size:2.6rem;letter-spacing:-.03em;line-height:1;margin-bottom:.5rem}
  .sub{font-size:.95rem;font-weight:300;color:#525252;margin-bottom:2.5rem}
  .links{display:flex;flex-direction:column;gap:0}
  a.link{display:grid;grid-template-columns:2.4rem 1fr auto;gap:1rem;align-items:center;
    padding:1.1rem 0;border-top:1px solid #e0e0e0;text-decoration:none;color:inherit;
    transition:background .15s}
  a.link:last-child{border-bottom:1px solid #e0e0e0}
  a.link:hover{background:rgba(0,47,167,.04)}
  a.link .num{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:#002FA7;font-weight:600;letter-spacing:.06em}
  a.link .label{font-weight:400;font-size:.92rem;line-height:1.3}
  a.link .desc{font-size:.72rem;color:#888;margin-top:.15rem;font-weight:300}
  a.link .arrow{font-size:.85rem;color:#bbb;transition:color .15s,transform .15s}
  a.link:hover .arrow{color:#002FA7;transform:translateX(3px)}
  .foot{margin-top:2.5rem;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:#bbb}
</style>
</head>
<body>
<div class="card">
  <div class="top mono">NTUT · 專案管理 · A 組 · 2026.05.22</div>
  <h1>EventHub</h1>
  <div class="sub">專案範疇管理 — 完整範例演示</div>
  <div class="links">
    <a class="link" href="ppt.html">
      <div class="num">01</div>
      <div><div class="label">PPT 翻頁版</div><div class="desc">16 頁瑞士風格網頁簡報，鍵盤翻頁</div></div>
      <div class="arrow">→</div>
    </a>
    <a class="link" href="report.html">
      <div class="num">02</div>
      <div><div class="label">書面報告</div><div class="desc">完整文件版，可列印</div></div>
      <div class="arrow">→</div>
    </a>
    <a class="link" href="wbs.html">
      <div class="num">03</div>
      <div><div class="label">WBS 樹狀圖</div><div class="desc">互動式工作分解結構，23 個工作包</div></div>
      <div class="arrow">→</div>
    </a>
    <a class="link" href="script.html">
      <div class="num">04</div>
      <div><div class="label">完整講稿</div><div class="desc">逐頁對照，約 15 分鐘</div></div>
      <div class="arrow">→</div>
    </a>
    <a class="link" href="script-short.html">
      <div class="num">05</div>
      <div><div class="label">簡易講稿</div><div class="desc">重點提示版，約 8 分鐘</div></div>
      <div class="arrow">→</div>
    </a>
  </div>
  <div class="foot mono">docs.arthurlin.dev/eventhub-scope</div>
</div>
</body>
</html>
